<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="stylesheet" href="style.css">
    <title>Calculator | pia imut</title>
</head>
<body>
    

    <div class="wrapper">
        <button id="history-toggle" class="history-btn">
        <div class="clock-icon"></div>
        </button>

    <div id="history-modal" class="history-modal hide">
    <div class="history-header">
        <button id="edit-toggle">Edit</button>
        
        <button id="clear-all" class="hide" style="color: red; font-size: 0.8rem;">Clear All</button>

        <button id="close-history" class="close-btn">&times;</button>
    </div>
    <ul id="history-list"></ul>
</div>

        <section class="screen">
            0
        </section>

        <section class="calc-buttons">
            <div class="calc-button-row">
                <button class="calc-button">
                    C
                </button>
                <button class="calc-button">
                    &larr;
                </button>
                <button class="calc-button">
                    %
                </button>
                <button class="calc-button">
                    &divide;
                </button>
            </div>

            <div class="calc-button-row">
                <button class="calc-button">
                    7
                </button>
                <button class="calc-button">
                    8
                </button>
                <button class="calc-button">
                    9
                </button>
                <button class="calc-button">
                    &times;
                </button>
            </div>

            <div class="calc-button-row">
                <button class="calc-button">
                    4
                </button>
                <button class="calc-button">
                    5
                </button>
                <button class="calc-button">
                    6
                </button>
                <button class="calc-button">
                    &minus;
                </button>
            </div>

            <div class="calc-button-row">
                <button class="calc-button">
                    1
                </button>
                <button class="calc-button">
                    2
                </button>
                <button class="calc-button">
                    3
                </button>
                <button class="calc-button">
                    &plus;
                </button>
            </div>

            <div class="calc-button-row">
                <button class="calc-button double">
                    0
                </button>
                <button class="calc-button">
                    .
                </button>
                <button class="calc-button">
                    &equals;
                </button>
            </div>

        </section>

    </div>

</section>
</div> <div class="watermark">pia-imut</div>
    
    <script src="script.js"></script>
</body>
</html>
